<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Performance Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #4facfe, #00f2fe);">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4">
                <h2 class="text-center mb-4">📊 Student Performance Predictor</h2>

                <form action="/predict" method="post">

                    <input type="number" step="0.1" class="form-control mb-3" name="study_hours" placeholder="Study Hours" required>

                    <input type="number" step="0.1" class="form-control mb-3" name="attendance" placeholder="Attendance (%)" required>

                    <input type="number" step="0.1" class="form-control mb-3" name="previous_score" placeholder="Previous Score" required>

                    <input type="number" step="0.1" class="form-control mb-3" name="sleep_hours" placeholder="Sleep Hours" required>

                    <button type="submit" class="btn btn-primary w-100">Predict Score</button>
                </form>

                <h4 class="text-center mt-4 text-success">
                    {{ prediction_text }}
                </h4>
                <h5 class="text-center text-muted">
                     Model Accuracy: {{ accuracy }}
                </h5>
            </div>

        </div>
    </div>
</div>

</body>
</html>
